name: deploy
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e
            cd /opt/san-assistant
            git pull origin main
            docker compose -f docker-compose.yml -f docker-compose.prod.yml build
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
            curl -f http://localhost:8000/api/health
            RESPONSE=$(curl -s -X POST http://localhost:8000/api/chat -H 'Content-Type: application/json' -d '{"session_id":null,"message":"Что за OXF01612?","answer_style":"short"}')
            export RESPONSE
            python3 - << 'PY'
import json, os
resp = json.loads(os.getenv('RESPONSE', '{}'))
assert resp.get('answer'), 'empty answer'
PY
