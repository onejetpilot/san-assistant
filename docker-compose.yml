services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    env_file: .env
    environment:
      - INTERNAL_API_BASE_URL=http://backend:8000
    ports:
      - "3000:3000"
    restart: unless-stopped
